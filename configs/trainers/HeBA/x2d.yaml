DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 64
  TEST:
    BATCH_SIZE: 128
  NUM_WORKERS: 16

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.0065
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0005
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 0
  WARMUP_TYPE: "linear"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

TRAINER:
  LWEIB:
    TEXT_CTX_INIT: "a photo of a"
    ADAPTER_START: 9
    ADAPTER_END: 12
    ADAPTER_SCALE: 0.05
    ADAPTER_SCALE_FACTOR: 10.0
    NEG_SAMPLING_RATIO: 5
    SLOW_FAST_RATIO: 0.8
    PREC: "amp"